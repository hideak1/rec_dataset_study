name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material mkdocs-jupyter

      - name: Copy notebooks to docs
        run: |
          mkdir -p docs/notebooks/01_criteo_feature_crossing
          mkdir -p docs/notebooks/02_taobao_sequential
          mkdir -p docs/notebooks/03_tenrec_cvr
          mkdir -p docs/notebooks/04_aliccp_cvr
          cp notebooks/01_criteo_feature_crossing/*.ipynb docs/notebooks/01_criteo_feature_crossing/
          cp notebooks/02_taobao_sequential/*.ipynb docs/notebooks/02_taobao_sequential/
          cp notebooks/03_tenrec_cvr/*.ipynb docs/notebooks/03_tenrec_cvr/
          cp notebooks/04_aliccp_cvr/*.ipynb docs/notebooks/04_aliccp_cvr/

      - name: Build MkDocs
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
