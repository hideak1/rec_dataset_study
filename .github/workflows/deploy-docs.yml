name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material mkdocs-jupyter

      - name: Copy notebooks and assets to docs
        run: |
          for dir in 01_criteo_feature_crossing 02_taobao_sequential 03_tenrec_cvr 04_aliccp_cvr; do
            mkdir -p "docs/notebooks/$dir"
            cp "notebooks/$dir/"*.ipynb "docs/notebooks/$dir/"
            cp "notebooks/$dir/"*.png "docs/notebooks/$dir/" 2>/dev/null || true
          done

      - name: Build MkDocs
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
